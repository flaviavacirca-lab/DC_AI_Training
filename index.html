<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denneen AI Learning Hub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <main class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <span class="brand-mark">D&amp;C</span>
            </div>
            <h1>Denneen AI Learning Hub</h1>
            <p class="login-subtitle">Internal resource for Denneen employees to improve Copilot usage in client work.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-name">Your Name</label>
                    <input type="text" id="login-name" required placeholder="e.g., Jane Smith">
                </div>
                <div class="form-group">
                    <label for="login-email">Work Email</label>
                    <input type="email" id="login-email" required placeholder="your.name@denneen.com">
                </div>
                <div class="form-error" id="login-error" hidden></div>
                <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
            </form>
            <p class="login-restriction">Access restricted to @denneen.com accounts.</p>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
