<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denneen AI Learning Hub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <main class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <span class="brand-mark">D&amp;C</span>
            </div>
            <h1>Denneen AI Learning Hub</h1>
            <p class="login-subtitle">Internal resource for Denneen employees to improve Copilot usage in client work.</p>

            <div id="auth-error" class="auth-error-banner" hidden></div>

            <button id="ms-signin-btn" class="btn-ms-signin" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 21 21">
                    <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                    <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                    <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                    <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                </svg>
                Sign in with Microsoft
            </button>

            <p class="login-restriction">@denneen.com work accounts only</p>
        </div>
    </main>

    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        (function () {
            // Show auth error if redirected back from failed login
            var errorMsg = DCAuth.getAuthError();
            var errorEl = document.getElementById('auth-error');
            if (errorMsg && errorEl) {
                errorEl.textContent = errorMsg;
                errorEl.hidden = false;
            }

            // If not authenticated, show message for redirected users
            if (!DCAuth.isAuthenticated()) {
                var params = new URLSearchParams(window.location.search);
                if (params.get('reason') === 'auth') {
                    errorEl.textContent = 'Please sign in with your Denneen Microsoft account to access internal content.';
                    errorEl.hidden = false;
                }
            }

            // Sign in button
            document.getElementById('ms-signin-btn').addEventListener('click', function () {
                DCAuth.login();
            });
        })();
    </script>
</body>
</html>
